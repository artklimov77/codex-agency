<svg width="240" height="240" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="code-grad" x1="22" y1="32" x2="78" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111124"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B7DEB" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2A3060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E1E38" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.7" fill="#3B7DEB" opacity="0.22"/>
    </pattern>
    <clipPath id="icon-clip">
      <rect x="4" y="4" width="92" height="92" rx="18"/>
    </clipPath>
  </defs>

  <!-- Outer glow ring -->
  <rect x="1" y="1" width="98" height="98" rx="21" fill="#2563EB" opacity="0.06" filter="url(#outer-glow)"/>

  <!-- Background -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="url(#bg-grad)"/>

  <!-- Dot pattern -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="url(#dots)" clip-path="url(#icon-clip)"/>

  <!-- Blue glow blob -->
  <ellipse cx="50" cy="52" rx="32" ry="20" fill="#2563EB" opacity="0.1" clip-path="url(#icon-clip)"/>

  <!-- Border -->
  <rect x="4.75" y="4.75" width="90.5" height="90.5" rx="17.5" fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- < bracket -->
  <path d="M 38 33 L 24 50 L 38 67"
    stroke="url(#code-grad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"/>

  <!-- / slash -->
  <path d="M 47.5 67 L 52.5 33"
    stroke="url(#code-grad)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"/>

  <!-- > bracket -->
  <path d="M 62 33 L 76 50 L 62 67"
    stroke="url(#code-grad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"/>


</svg>
